# Tells Render what to build. Creates the website AND the database in one step.
services:
  - type: web
    name: midbid
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true              # Render makes a long random secret for you
      - key: DATABASE_URL
        fromDatabase:
          name: midbid-db
          property: connectionString
      - key: ADMIN_EMAIL
        value: midbid.settle@gmail.com    # this account sees the Admin portal
      - key: NOTIFY_EMAIL
        value: midbid.settle@gmail.com    # where alert emails are sent
      - key: APP_URL
        value: https://midbid-wdpc.onrender.com
      - key: RESEND_API_KEY
        sync: false                        # you paste this in the Render dashboard

databases:
  - name: midbid-db
    plan: free
    databaseName: midbid
    user: midbid
