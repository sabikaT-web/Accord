# This file tells Render what to build. With it, Render can create the website
# AND the database for you in one step (see DEPLOY.md).
services:
  - type: web
    name: accord
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true        # Render makes a long random secret for you
      - key: DATABASE_URL
        fromDatabase:
          name: accord-db
          property: connectionString

databases:
  - name: accord-db
    plan: free
    databaseName: accord
    user: accord
